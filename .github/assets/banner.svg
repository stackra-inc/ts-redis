<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <circle cx="950" cy="80" r="180" fill="#f87171" opacity="0.03"/>
  <circle cx="1000" cy="120" r="120" fill="#818cf8" opacity="0.04"/>
  <circle cx="200" cy="350" r="150" fill="#c084fc" opacity="0.03"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  <!-- Redis cylinder (red) -->
  <g transform="translate(88, 115)" filter="url(#glow)">
    <ellipse cx="60" cy="20" rx="44" ry="12" fill="none" stroke="#f87171" stroke-width="2.5"/>
    <rect x="16" y="20" width="88" height="70" fill="#1e293b" stroke="none"/>
    <ellipse cx="60" cy="90" rx="44" ry="12" fill="none" stroke="#818cf8" stroke-width="2"/>
    <line x1="16" y1="20" x2="16" y2="90" stroke="#f87171" stroke-width="2" opacity="0.6"/>
    <line x1="104" y1="20" x2="104" y2="90" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
    <text x="60" y="62" font-family="ui-monospace,monospace" font-size="18" font-weight="700" fill="#f87171" text-anchor="middle" opacity="0.9">R</text>
  </g>
  <text x="240" y="178" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="42" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">@stackra/ts-redis</text>
  <text x="240" y="218" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="18" fill="#94a3b8">Client-side Redis via Upstash HTTP API — connection management + DI</text>
  <g transform="translate(240, 245)">
    <rect x="0" y="0" width="96" height="32" rx="6" fill="#f87171" opacity="0.12"/>
    <rect x="0" y="0" width="96" height="32" rx="6" fill="none" stroke="#f87171" stroke-width="1" opacity="0.3"/>
    <text x="48" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#f87171" text-anchor="middle">Upstash</text>
    <rect x="112" y="0" width="96" height="32" rx="6" fill="#818cf8" opacity="0.12"/>
    <rect x="112" y="0" width="96" height="32" rx="6" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <text x="160" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#818cf8" text-anchor="middle">HTTP API</text>
    <rect x="224" y="0" width="80" height="32" rx="6" fill="#38bdf8" opacity="0.12"/>
    <rect x="224" y="0" width="80" height="32" rx="6" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
    <text x="264" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#38bdf8" text-anchor="middle">DI</text>
    <rect x="320" y="0" width="110" height="32" rx="6" fill="#34d399" opacity="0.12"/>
    <rect x="320" y="0" width="110" height="32" rx="6" fill="none" stroke="#34d399" stroke-width="1" opacity="0.3"/>
    <text x="375" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#34d399" text-anchor="middle">Multi-conn</text>
  </g>
  <g transform="translate(780, 110)" opacity="0.5">
    <text font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#64748b">
      <tspan x="0" dy="0" fill="#38bdf8">RedisModule</tspan><tspan fill="#94a3b8">.</tspan><tspan fill="#38bdf8">forRoot</tspan><tspan fill="#94a3b8">({</tspan>
      <tspan x="20" dy="24" fill="#f59e0b">default</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#34d399">'cache'</tspan><tspan fill="#94a3b8">,</tspan>
      <tspan x="20" dy="24" fill="#f59e0b">connections</tspan><tspan fill="#94a3b8">: {</tspan>
      <tspan x="40" dy="24" fill="#f59e0b">cache</tspan><tspan fill="#94a3b8">: { url: </tspan><tspan fill="#34d399">UPSTASH_URL</tspan><tspan fill="#94a3b8"> }</tspan>
      <tspan x="20" dy="24" fill="#94a3b8">}</tspan>
      <tspan x="0" dy="24" fill="#94a3b8">})</tspan>
    </text>
  </g>
  <rect x="0" y="397" width="1200" height="3" fill="url(#accent)"/>
  <g transform="translate(1080, 360)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#f87171" opacity="0.1"/>
    <text x="40" y="16" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="12" fill="#f87171" text-anchor="middle">v1.1.3</text>
  </g>
</svg>
